name: CI/CD Pipeline to AWS ECR/ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1 # Change to your preferred region
  BACKEND_ECR_REPOSITORY: forever-backend
  FRONTEND_ECR_REPOSITORY: forever-frontend
  ADMIN_ECR_REPOSITORY: forever-admin
  ECS_CLUSTER: forever-cluster
  ECS_BACKEND_SERVICE: forever-backend-service
  ECS_FRONTEND_SERVICE: forever-frontend-service
  ECS_ADMIN_SERVICE: forever-admin-service
  ECS_BACKEND_TASK_DEFINITION: .aws/backend-task-definition.json
  ECS_FRONTEND_TASK_DEFINITION: .aws/frontend-task-definition.json
  ECS_ADMIN_TASK_DEFINITION: .aws/admin-task-definition.json
  CONTAINER_NAME_BACKEND: backend
  CONTAINER_NAME_FRONTEND: frontend
  CONTAINER_NAME_ADMIN: admin

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # --- Build and Push Backend ---
    - name: Build, tag, and push Backend image to Amazon ECR
      id: build-image-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG ./backend
        docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest ./backend
        docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # --- Build and Push Frontend ---
    - name: Build, tag, and push Frontend image to Amazon ECR
      id: build-image-frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG ./frontend
        docker build -t $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest ./frontend
        docker push $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # --- Build and Push Admin ---
    - name: Build, tag, and push Admin image to Amazon ECR
      id: build-image-admin
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG ./admin
        docker build -t $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:latest ./admin
        docker push $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # --- Deploy Backend ---
    - name: Fill in the new image ID in the Amazon ECS task definition (Backend)
      id: task-def-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_BACKEND_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME_BACKEND }}
        image: ${{ steps.build-image-backend.outputs.image }}

    - name: Deploy Amazon ECS task definition (Backend)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
        service: ${{ env.ECS_BACKEND_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # --- Deploy Frontend ---
    - name: Fill in the new image ID in the Amazon ECS task definition (Frontend)
      id: task-def-frontend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_FRONTEND_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME_FRONTEND }}
        image: ${{ steps.build-image-frontend.outputs.image }}

    - name: Deploy Amazon ECS task definition (Frontend)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
        service: ${{ env.ECS_FRONTEND_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # --- Deploy Admin ---
    - name: Fill in the new image ID in the Amazon ECS task definition (Admin)
      id: task-def-admin
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_ADMIN_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME_ADMIN }}
        image: ${{ steps.build-image-admin.outputs.image }}

    - name: Deploy Amazon ECS task definition (Admin)
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def-admin.outputs.task-definition }}
        service: ${{ env.ECS_ADMIN_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
